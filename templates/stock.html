<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSignal AI - Stocks & Commodities</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">BioSignal <span>AI</span></div>

            <!-- SELECT CATEGORY -->
            <div class="section-title">SELECT CATEGORY</div>
            <div class="category-buttons">
                <button class="category-btn active" onclick="changeCategory('stock')">📈 Stock Market</button>
                <button class="category-btn" onclick="changeCategory('currency')">💱 Currency</button>
                <button class="category-btn" onclick="changeCategory('mineral')">⛏ Mineral</button>
            </div>

            <!-- SELECT ASSET -->
            <div class="section-title">SELECT A $ SET</div>
            <select id="assetSelect" onchange="onAssetChange()"></select>

            <!-- QUICK SYMBOLS -->
            <div class="section-title">QUICK SYMBOLS</div>
            <div class="quick-symbols" id="quickSymbols"></div>

            <!-- VIEW MODE (SINGLE/MULTI) -->
            <div class="section-title">VIEW MODE</div>
            <div class="viewer-type" style="margin-bottom: 15px;">
                <button class="viewer-type-btn active" onclick="changeViewMode('single')">SINGLE</button>
                <button class="viewer-type-btn" onclick="changeViewMode('multi')">MULTI</button>
            </div>

            <!-- CHART TYPE (بيتغير حسب الفئة) -->
            <div class="section-title">CHART TYPE</div>
            <select id="chartTypeSelect" onchange="onChartTypeChange()"></select>

            <!-- WINDOW SIZE -->
            <div class="section-title">WINDOW SIZE: <span id="windowSizeVal">300</span></div>
            <input type="range" id="windowSize" min="50" max="1000" value="300" 
                   oninput="document.getElementById('windowSizeVal').innerText = this.value">

            <!-- PREDICTION BUTTON -->
            <button class="prediction-btn" onclick="togglePrediction()">
                📈 Predict Future Behavior
            </button>

            <!-- ACTION BUTTONS -->
            <button class="btn-run" onclick="loadAndDisplay()">📊 DISPLAY SIGNAL</button>
            <button class="btn-secondary" onclick="clearAll()">🗑 Clear All</button>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- AI Status Bar -->
            <div class="ai-status-bar" id="aiStatus">
                ⚡ Ready to analyze stocks and commodities
            </div>

            <!-- Charts Grid -->
            <div class="grid-container" id="chartGrid"></div>

            <!-- Footer Controls -->
            <div class="footer-controls">
                <button class="footer-btn play" onclick="playAll()">▶ PLAY ALL</button>
                <button class="footer-btn stop" onclick="stopAll()">⏹ STOP ALL</button>
                <div style="flex:1"></div>
                <div id="currentPrice" style="color: var(--accent); font-weight: bold;"></div>
            </div>
        </main>
    </div>

    <script>
        // ==================== المتغيرات العامة ====================
        let currentCategory = 'stock';
        let currentAsset = 'AAPL';
        let viewMode = 'single';  // 'single' or 'multi'
        let chartData = null;
        let animations = {};
        let categoriesData = {};

        // Charts types لكل فئة
        const chartTypes = {
            stock: [
                { value: 'candlestick', name: 'Candlestick + Volume' },
                { value: 'ma_overlay', name: 'MA Overlay (20/50)' },
                { value: 'comparison', name: '% Comparison' },
                { value: 'standard', name: 'Line Chart' }
            ],
            currency: [
                { value: 'standard', name: 'Line Chart' },
                { value: 'bollinger', name: 'Bollinger Bands' },
                { value: 'volatility', name: 'Rolling Volatility' },
                { value: 'ma_overlay', name: 'MA Overlay' }
            ],
            mineral: [
                { value: 'candlestick', name: 'Candlestick' },
                { value: 'ma_50_200', name: 'MA 50/200 Cross' },
                { value: 'seasonality', name: 'Seasonality' },
                { value: 'standard', name: 'Line Chart' }
            ]
        };

        // ==================== التهيئة ====================
        window.onload = function() {
            loadCategories();
        };

        function loadCategories() {
            fetch('/api/categories')
                .then(res => res.json())
                .then(data => {
                    categoriesData = data;
                    loadAssets('stock');
                    updateQuickSymbols('stock');
                    updateChartTypes('stock');
                })
                .catch(err => {
                    console.error('Failed to load categories:', err);
                    document.getElementById('aiStatus').innerHTML = '❌ Failed to connect to server';
                });
        }

        // ==================== إدارة الأصول ====================
        function loadAssets(category) {
            const select = document.getElementById('assetSelect');
            select.innerHTML = '';
            
            if (!categoriesData[category]) return;
            
            categoriesData[category].forEach(asset => {
                const option = document.createElement('option');
                option.value = asset.symbol;
                option.textContent = `${asset.display} - ${asset.name}`;
                select.appendChild(option);
            });
            
            currentAsset = categoriesData[category][0]?.symbol || 'AAPL';
        }

        function updateQuickSymbols(category) {
            const container = document.getElementById('quickSymbols');
            container.innerHTML = '';
            
            if (!categoriesData[category]) return;
            
            const symbols = categoriesData[category].slice(0, 6);
            symbols.forEach(asset => {
                const btn = document.createElement('button');
                btn.className = 'symbol-btn';
                btn.textContent = asset.display;
                btn.onclick = () => quickSymbol(asset.symbol, category);
                container.appendChild(btn);
            });
        }

        function updateChartTypes(category) {
            const select = document.getElementById('chartTypeSelect');
            select.innerHTML = '';
            
            chartTypes[category].forEach(type => {
                const option = document.createElement('option');
                option.value = type.value;
                option.textContent = type.name;
                select.appendChild(option);
            });
        }

        // ==================== Event Handlers ====================
        function changeCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadAssets(category);
            updateQuickSymbols(category);
            updateChartTypes(category);
            
            // لو في بيانات محملة، نعرضها تاني
            if (chartData) {
                loadAndDisplay();
            }
        }

        function changeViewMode(mode) {
            viewMode = mode;
            
            document.querySelectorAll('.viewer-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (chartData) {
                displaySignal();
            }
        }

        function onAssetChange() {
            const select = document.getElementById('assetSelect');
            currentAsset = select.value;
        }

        function onChartTypeChange() {
            if (chartData) {
                displaySignal();
            }
        }

        function quickSymbol(symbol, category) {
            currentCategory = category;
            currentAsset = symbol;
            
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(
                    category === 'mineral' ? 'mineral' : 
                    category === 'currency' ? 'currency' : 'stock'
                )) {
                    btn.classList.add('active');
                }
            });
            
            loadAssets(category);
            updateQuickSymbols(category);
            updateChartTypes(category);
            
            setTimeout(loadAndDisplay, 200);
        }

        // ==================== تحميل وعرض البيانات ====================
        function loadAndDisplay() {
            document.getElementById('aiStatus').innerHTML = '⏳ Loading data...';
            
            fetch(`/api/data/${currentCategory}/${currentAsset}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('aiStatus').innerHTML = `❌ Error: ${data.error}`;
                        console.error('Data error:', data.error);
                        return;
                    }
                    
                    if (!data.prices || !data.prices.close) {
                        document.getElementById('aiStatus').innerHTML = '❌ No price data available';
                        return;
                    }
                    
                    chartData = data;
                    document.getElementById('aiStatus').innerHTML = 
                        `✅ Loaded ${data.symbol} - ${data.count} data points`;
                    
                    displaySignal();
                })
                .catch(err => {
                    document.getElementById('aiStatus').innerHTML = '❌ Failed to load data';
                    console.error('Fetch error:', err);
                });
        }

        function displaySignal() {
            if (!chartData) {
                console.error('No chart data available');
                document.getElementById('aiStatus').innerHTML = '❌ No data to display';
                return;
            }            
            console.log('Displaying signal with dates:', chartData.dates.slice(0, 5));
            console.log('First few prices:', chartData.prices.close.slice(0, 5));
            console.log('DISPLAY SIGNAL CALLED');
            console.log('Chart Data:', chartData);
            console.log('Dates sample:', chartData.dates?.slice(0, 3));
            console.log('Prices sample:', chartData.prices?.close?.slice(0, 3));
                                
            const grid = document.getElementById('chartGrid');
            const chartType = document.getElementById('chartTypeSelect').value;
            
            grid.innerHTML = '';
            
            if (viewMode === 'single') {
                // SINGLE MODE - رسمة واحدة كبيرة
                grid.className = 'grid-container';
                
                const card = createChartCard('main', chartType, true);
                grid.appendChild(card);
                
                setTimeout(() => {
                    renderChart('main', chartType, chartData);
                }, 100);
                
            } else {
                // MULTI MODE - 4 رسوم
                grid.className = 'grid-container multi-view';
                
                // نجيب أول 4 أنواع من الـ chart types
                const types = chartTypes[currentCategory].map(t => t.value).slice(0, 4);
                
                types.forEach((type, i) => {
                    const card = createChartCard(`chart_${i}`, type, false);
                    grid.appendChild(card);
                    
                    setTimeout(() => {
                        renderChart(`chart_${i}`, type, chartData);
                    }, 100 * (i + 1));
                });
            }
            
            // تحديث السعر الحالي
            if (chartData.prices && chartData.prices.close) {
                const lastPrice = chartData.prices.close[chartData.prices.close.length - 1];
                const firstPrice = chartData.prices.close[0];
                const change = ((lastPrice - firstPrice) / firstPrice * 100).toFixed(2);
                
                document.getElementById('currentPrice').innerHTML = 
                    `Current: $${lastPrice.toFixed(2)} (${change}%)`;
            }
        }

        function createChartCard(id, chartType, isSingle) {
            const card = document.createElement('div');
            card.className = isSingle ? 'chart-card single' : 'chart-card multi';
            card.id = `card-${id}`;
            
            // اسم الرسمة
            let typeName = chartType;
            for (const [cat, types] of Object.entries(chartTypes)) {
                const found = types.find(t => t.value === chartType);
                if (found) {
                    typeName = found.name;
                    break;
                }
            }
            
            card.innerHTML = `
                <div class="card-header">
                    <span>${typeName || chartType.toUpperCase()}</span>
                    <div class="card-controls">
                        <button class="play-btn-small" onclick="toggleAnimation('${id}')">▶</button>
                    </div>
                </div>
                <div id="${id}" class="chart-container"></div>
            `;
            
            return card;
        }

        // ==================== دوال الرسم ====================
        function renderChart(divId, type, data) {
            console.log(`Rendering chart in ${divId}, type: ${type}`);
            
            if (!data) {
                console.error('No data provided to renderChart');
                document.getElementById(divId).innerHTML = '<div style="color: red; padding: 20px;">No data</div>';
                return;
            }
            
            if (!data.prices) {
                console.error('No prices in data');
                document.getElementById(divId).innerHTML = '<div style="color: red; padding: 20px;">No price data</div>';
                return;
            }
            
            // التأكد من وجود dates
            let dates = data.dates || [];
            if (dates.length === 0) {
                // لو مفيش تواريخ، استخدم index
                dates = Array.from({length: data.prices.close?.length || 0}, (_, i) => `Day ${i+1}`);
            }
            
            console.log(`Dates length: ${dates.length}`);
            console.log(`Close prices length: ${data.prices.close?.length}`);
            
            let traces = [];
            let layout = {
                paper_bgcolor: '#1e293b',
                plot_bgcolor: '#1e293b',
                font: { color: '#f1f5f9', size: 10 },
                margin: { l: 50, r: 50, t: 50, b: 50 },
                showlegend: true,
                legend: { 
                    font: { size: 9 },
                    orientation: 'h',
                    y: 1.1,
                    x: 0.5,
                    xanchor: 'center'
                },
                xaxis: { 
                    title: 'Date',
                    gridcolor: '#334155', 
                    color: '#94a3b8',
                    tickfont: { size: 9 },
                    rangeslider: { visible: false }
                },
                yaxis: { 
                    title: 'Price ($)',
                    gridcolor: '#334155', 
                    color: '#94a3b8',
                    tickfont: { size: 9 }
                },
                title: {
                    text: `${data.symbol || 'Chart'} - ${type}`,
                    font: { color: '#f1f5f9', size: 12 }
                }
            };
            
            // ===== STOCK CHARTS =====
            if (type === 'candlestick') {
                if (data.prices.open && data.prices.high && data.prices.low && data.prices.close) {
                    console.log('Drawing candlestick...');
                    
                    // Candlestick
                    traces.push({
                        x: dates,
                        open: data.prices.open,
                        high: data.prices.high,
                        low: data.prices.low,
                        close: data.prices.close,
                        type: 'candlestick',
                        name: data.symbol || 'Price',
                        increasing: { 
                            line: { color: '#22c55e' },
                            fillcolor: '#22c55e'
                        },
                        decreasing: { 
                            line: { color: '#ef4444' },
                            fillcolor: '#ef4444'
                        },
                        yaxis: 'y',
                        showlegend: true
                    });
                    
                    // Volume
                    if (data.prices.volume) {
                        traces.push({
                            x: dates,
                            y: data.prices.volume,
                            type: 'bar',
                            name: 'Volume',
                            yaxis: 'y2',
                            marker: {
                                color: data.prices.close.map((c, i) => 
                                    c > (data.prices.open[i] || c) ? '#22c55e80' : '#ef444480'
                                )
                            },
                            showlegend: true
                        });
                        
                        layout.yaxis2 = {
                            title: 'Volume',
                            overlaying: 'y',
                            side: 'right',
                            gridcolor: '#334155',
                            color: '#94a3b8',
                            domain: [0, 0.25]
                        };
                        
                        layout.yaxis.domain = [0.3, 1];
                    }
                } else {
                    // Fallback to line chart
                    console.log('Candlestick data missing, using line chart');
                    traces.push({
                        x: dates,
                        y: data.prices.close || [],
                        type: 'scatter',
                        mode: 'lines',
                        name: 'Close',
                        line: { color: '#38bdf8', width: 2 }
                    });
                }
            }
            else if (type === 'standard' || type === 'line') {
                // Line Chart
                traces.push({
                    x: dates,
                    y: data.prices.close || [],
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 2 }
                });
            }
            else if (type === 'ma_overlay') {
                // MA Overlay
                const close = data.prices.close || [];
                const ma20 = calculateMA(close, 20);
                const ma50 = calculateMA(close, 50);
                
                traces.push({
                    x: dates,
                    y: close,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 1.5 }
                });
                
                traces.push({
                    x: dates,
                    y: ma20,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 20',
                    line: { color: '#fbbf24', width: 2 }
                });
                
                traces.push({
                    x: dates,
                    y: ma50,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 50',
                    line: { color: '#fb7185', width: 2 }
                });
            }
            else if (type === 'comparison') {
                // Percentage Change
                const close = data.prices.close || [];
                if (close.length > 0) {
                    const base = close[0];
                    const pctChange = close.map(v => ((v - base) / base * 100));
                    
                    traces.push({
                        x: dates,
                        y: pctChange,
                        type: 'scatter',
                        mode: 'lines',
                        name: '% Change',
                        line: { color: '#38bdf8', width: 2 },
                        fill: 'tozeroy',
                        fillcolor: 'rgba(56, 189, 248, 0.2)'
                    });
                    
                    layout.yaxis.title = 'Change (%)';
                }
            }
            
            // ===== CURRENCY CHARTS =====
            else if (type === 'bollinger') {
                const close = data.prices.close || [];
                const ma20 = calculateMA(close, 20);
                const std = calculateSTD(close, 20);
                
                const upper = ma20.map((m, i) => m + 2 * (std[i] || 0));
                const lower = ma20.map((m, i) => m - 2 * (std[i] || 0));
                
                traces.push({
                    x: dates,
                    y: close,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 1.5 }
                });
                
                traces.push({
                    x: dates,
                    y: ma20,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 20',
                    line: { color: '#fbbf24', width: 2 }
                });
                
                traces.push({
                    x: dates,
                    y: upper,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Upper Band',
                    line: { color: '#94a3b8', width: 1, dash: 'dash' }
                });
                
                traces.push({
                    x: dates,
                    y: lower,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Lower Band',
                    line: { color: '#94a3b8', width: 1, dash: 'dash' },
                    fill: 'tonexty',
                    fillcolor: 'rgba(148, 163, 184, 0.1)'
                });
            }
            else if (type === 'volatility') {
                const close = data.prices.close || [];
                const returns = [];
                for (let i = 1; i < close.length; i++) {
                    returns.push(Math.log(close[i] / close[i-1]) * 100);
                }
                
                const vol = calculateSTD(returns, 20);
                const volDates = dates.slice(20);
                
                traces.push({
                    x: volDates,
                    y: vol.slice(20),
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Volatility %',
                    line: { color: '#fb7185', width: 2 },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(251, 113, 133, 0.2)'
                });
                
                layout.yaxis.title = 'Volatility (%)';
            }
            
            // ===== MINERAL CHARTS =====
            else if (type === 'ma_50_200') {
                const close = data.prices.close || [];
                const ma50 = calculateMA(close, 50);
                const ma200 = calculateMA(close, 200);
                
                traces.push({
                    x: dates,
                    y: close,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#94a3b8', width: 1 }
                });
                
                traces.push({
                    x: dates,
                    y: ma50,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 50',
                    line: { color: '#fbbf24', width: 2 }
                });
                
                traces.push({
                    x: dates,
                    y: ma200,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 200',
                    line: { color: '#fb7185', width: 2 }
                });
            }
            else if (type === 'seasonality') {
                // Seasonality by month
                const monthData = {};
                dates.forEach((date, i) => {
                    if (i < (data.prices.close?.length || 0)) {
                        let month;
                        if (date.includes('-')) {
                            month = date.split('-')[1]; // YYYY-MM-DD
                        } else {
                            month = Math.floor(i / 30) % 12 + 1;
                        }
                        
                        if (!monthData[month]) monthData[month] = [];
                        monthData[month].push(data.prices.close[i]);
                    }
                });
                
                const months = Object.keys(monthData).sort();
                const avgByMonth = months.map(m => {
                    const vals = monthData[m];
                    return vals.reduce((a, b) => a + b, 0) / vals.length;
                });
                
                traces.push({
                    x: months.map(m => {
                        const names = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        return names[parseInt(m) - 1];
                    }),
                    y: avgByMonth,
                    type: 'bar',
                    name: 'Avg Price by Month',
                    marker: { color: '#38bdf8' }
                });
            }
            
            // ===== FALLBACK =====
            if (traces.length === 0) {
                console.log('No traces created, using fallback line chart');
                traces.push({
                    x: dates,
                    y: data.prices.close || [],
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 2 }
                });
            }
            
            console.log(`Created ${traces.length} traces`);
            
            // رسم الرسم البياني
            try {
                Plotly.newPlot(divId, traces, layout, { 
                    responsive: true,
                    displayModeBar: true,
                    displaylogo: false
                });
                console.log(`Successfully plotted in ${divId}`);
            } catch (error) {
                console.error('Plotly error:', error);
                document.getElementById(divId).innerHTML = `<div style="color: red; padding: 20px;">Error: ${error.message}</div>`;
            }
        }
        // ==================== Helper Functions ====================
        function calculateMA(data, window) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < window - 1) {
                    result.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < window; j++) {
                        sum += data[i - j];
                    }
                    result.push(sum / window);
                }
            }
            return result;
        }

        function calculateSTD(data, window) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < window - 1) {
                    result.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < window; j++) {
                        sum += data[i - j];
                    }
                    const mean = sum / window;
                    
                    let sqSum = 0;
                    for (let j = 0; j < window; j++) {
                        sqSum += Math.pow(data[i - j] - mean, 2);
                    }
                    result.push(Math.sqrt(sqSum / window));
                }
            }
            return result;
        }

        // ==================== Animation Controls ====================
        function toggleAnimation(divId) {
            const btn = event.target;
            
            if (animations[divId]) {
                clearInterval(animations[divId]);
                delete animations[divId];
                btn.innerHTML = '▶';
            } else {
                let pos = 0;
                animations[divId] = setInterval(() => {
                    pos += 5;
                    Plotly.relayout(divId, {
                        'xaxis.range': [pos, pos + 100]
                    });
                }, 50);
                btn.innerHTML = '⏸';
            }
        }

        function playAll() {
            document.querySelectorAll('.play-btn-small').forEach(btn => {
                if (btn.innerHTML === '▶') {
                    btn.click();
                }
            });
        }

        function stopAll() {
            Object.keys(animations).forEach(id => {
                clearInterval(animations[id]);
                delete animations[id];
            });
            
            document.querySelectorAll('.play-btn-small').forEach(btn => {
                btn.innerHTML = '▶';
            });
        }

        function clearAll() {
            stopAll();
            document.getElementById('chartGrid').innerHTML = '';
            document.getElementById('aiStatus').innerHTML = '⚡ Ready to analyze stocks and commodities';
            chartData = null;
        }

        function togglePrediction() {
            alert('Prediction feature coming soon!');
        }
    </script>
</body>
</html>
