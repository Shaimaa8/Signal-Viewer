<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSignal AI - Stocks & Commodities</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar (Left Panel) -->
        <aside class="sidebar">
            <div class="logo">BioSignal <span>AI</span></div>

            <!-- SELECT CATEGORY -->
            <div class="section-title">SELECT CATEGORY</div>
            <div class="category-buttons">
                <button class="category-btn active" onclick="changeCategory('stock')">📈 Stock Market</button>
                <button class="category-btn" onclick="changeCategory('currency')">💱 Currency</button>
                <button class="category-btn" onclick="changeCategory('mineral')">⛏ Mineral</button>
            </div>

            <!-- UPLOAD CSV FILE -->
            <div class="section-title">UPLOAD CSV FILE</div>
            <div class="data-source">
                <div class="data-type" id="data-type-display">📊 STOCK MARKET</div>

                <div class="file-input" style="margin-top: 10px;">
                    <input type="text" id="filename" placeholder="Choose CSV file..." readonly>
                    <button onclick="document.getElementById('file-upload').click()">Browse</button>
                    <input type="file" id="file-upload" accept=".csv" style="display: none;"
                        onchange="handleFileUpload(this)">
                </div>

                <div style="display: flex; gap: 8px; margin-top: 15px;">
                    <button class="load-btn" style="flex: 1;" onclick="loadUploadedFile()">
                        📂 LOAD DATA
                    </button>
                </div>

                <button class="display-btn" onclick="displaySignal()" style="margin-top: 15px;">
                    📈 DISPLAY SIGNAL
                </button>
            </div>

            <!-- FILE INFO (appears after upload) -->
            <div id="file-info" style="display: none;">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span style="color: var(--text-secondary);">File:</span>
                    <span id="info-filename" style="color: var(--accent);">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px;">
                    <span style="color: var(--text-secondary);">Points:</span>
                    <span id="info-points" style="color: var(--accent);">-</span>
                </div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px;">
                    <span style="color: var(--text-secondary);">Date range:</span>
                    <span id="info-dates" style="color: var(--accent);">-</span>
                </div>
            </div>

            <!-- VIEW MODE (SINGLE/MULTI) -->
            <div class="section-title">VIEW MODE</div>
            <div class="viewer-type" style="margin-bottom: 15px;">
                <button class="viewer-type-btn active" onclick="changeViewMode('single')">SINGLE</button>
                <button class="viewer-type-btn" onclick="changeViewMode('multi')">MULTI</button>
            </div>

            <!-- DISPLAY MODE (STATIC/OVER TIME) -->
            <div class="section-title">DISPLAY MODE</div>
            <div class="viewer-type" style="margin-bottom: 15px;">
                <button class="mode-btn active" onclick="toggleDisplayMode('static')">📊 STATIC</button>
                <button class="mode-btn" onclick="toggleDisplayMode('overtime')">⏵ OVER TIME</button>
            </div>

            <!-- CHART TYPE (changes by category) -->
            <div class="section-title">CHART TYPE</div>
            <select id="chartTypeSelect" onchange="onChartTypeChange()"></select>

            <!-- WINDOW SIZE -->
            <div class="section-title">WINDOW SIZE: <span id="windowSizeVal">300</span></div>
            <input type="range" id="windowSize" min="50" max="1000" value="300"
                oninput="document.getElementById('windowSizeVal').innerText = this.value">

            <!-- PREDICTION SECTION -->
            <div class="section-title">PREDICTION</div>
            <div style="background: var(--bg-dark); padding: 1rem; border-radius: 8px; margin-bottom: 1rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <label style="color: var(--text-secondary);">Forecast Days:</label>
                    <input type="number" id="forecastDays" value="30" min="5" max="365"
                        style="width: 80px; background: var(--sidebar-bg); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 4px;">
                </div>
                <button class="prediction-btn" onclick="runPrediction()">
                    📈 Predict Future Behavior
                </button>
            </div>

            <!-- ACTION BUTTONS -->
            <button class="btn-secondary" onclick="clearAll()">🗑 Clear All</button>
        </aside>

        <!-- Main Content (Middle Panel) -->
        <main class="main-content">
            <!-- AI Status Bar -->
            <div class="ai-status-bar" id="aiStatus">
                ⚡ Ready to analyze stocks and commodities
            </div>

            <!-- Charts Grid -->
            <div class="grid-container" id="chartGrid"></div>

            <!-- Footer Controls -->
            <div class="footer-controls">
                <button class="footer-btn play" onclick="playAll()">▶ PLAY ALL</button>
                <button class="footer-btn stop" onclick="stopAll()">⏹ STOP ALL</button>
                <div style="flex:1"></div>
                <div id="currentPrice" style="color: var(--accent); font-weight: bold;"></div>
            </div>
        </main>
    </div>

    <script>
        // ==================== GLOBAL VARIABLES ====================
        let currentCategory = 'stock';
        let viewMode = 'single';
        let displayMode = 'static'; // 'static' or 'overtime'
        let chartData = null;
        let animations = {};
        let animationPositions = {};
        let predictionColors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'];

        const chartTypes = {
            stock: [
                { value: 'candlestick', name: 'Candlestick + Volume' },
                { value: 'ma_overlay', name: 'MA Overlay (20/50)' },
                { value: 'comparison', name: '% Comparison' },
                { value: 'standard', name: 'Line Chart' }
            ],
            currency: [
                { value: 'standard', name: 'Line Chart' },
                { value: 'bollinger', name: 'Bollinger Bands' },
                { value: 'volatility', name: 'Rolling Volatility' },
                { value: 'ma_overlay', name: 'MA Overlay' }
            ],
            mineral: [
                { value: 'candlestick', name: 'Candlestick' },
                { value: 'ma_50_200', name: 'MA 50/200 Cross' },
                { value: 'seasonality', name: 'Seasonality' },
                { value: 'standard', name: 'Line Chart' }
            ]
        };

        // ==================== INITIALIZATION ====================
        window.onload = function () {
            updateChartTypes(currentCategory);
            updateCategoryDisplay(currentCategory);
            showWelcomeMessage();
        };

        function showWelcomeMessage() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-secondary);">
                    <div style="font-size: 48px; margin-bottom: 20px;">📊</div>
                    <h3>No Signal Displayed</h3>
                    <p>Upload a CSV file and click DISPLAY SIGNAL to view data</p>
                </div>
            `;
        }

        function updateCategoryDisplay(category) {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(category)) {
                    btn.classList.add('active');
                }
            });

            const typeMap = {
                stock: '📊 STOCK MARKET',
                currency: '💱 CURRENCY',
                mineral: '⛏ MINERAL'
            };
            document.getElementById('data-type-display').textContent = typeMap[category];
        }

        function updateChartTypes(category) {
            const select = document.getElementById('chartTypeSelect');
            select.innerHTML = '';

            chartTypes[category].forEach(type => {
                const option = document.createElement('option');
                option.value = type.value;
                option.textContent = type.name;
                select.appendChild(option);
            });
        }

        // ==================== EVENT HANDLERS ====================
        function changeCategory(category) {
            currentCategory = category;
            updateCategoryDisplay(category);
            updateChartTypes(category);
            document.getElementById('file-info').style.display = 'none';
            chartData = null;
        }

        function changeViewMode(mode) {
            viewMode = mode;
            document.querySelectorAll('.viewer-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (chartData) {
                displaySignal();
            }
        }

        function onChartTypeChange() {
            if (chartData) {
                displaySignal();
            }
        }

        // ==================== FILE UPLOAD FUNCTIONS ====================
        function handleFileUpload(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('filename').value = file.name;
            }
        }

        function loadUploadedFile() {
            const fileInput = document.getElementById('file-upload');
            const file = fileInput.files[0];

            if (!file) {
                alert('Please select a file first');
                return;
            }

            document.getElementById('aiStatus').innerHTML = '⏳ Loading file...';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('category', currentCategory);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('aiStatus').innerHTML = `❌ ${data.error}`;
                        return;
                    }

                    chartData = data;

                    document.getElementById('info-filename').textContent = file.name;
                    document.getElementById('info-points').textContent = data.count || data.prices?.close?.length || '-';

                    if (data.dates && data.dates.length > 0) {
                        const firstDate = data.dates[0];
                        const lastDate = data.dates[data.dates.length - 1];
                        document.getElementById('info-dates').textContent = `${firstDate} to ${lastDate}`;
                    }

                    document.getElementById('file-info').style.display = 'block';
                    document.getElementById('aiStatus').innerHTML = `✅ Loaded ${file.name}`;
                })
                .catch(err => {
                    document.getElementById('aiStatus').innerHTML = '❌ Failed to load file';
                });
        }

        // ==================== DISPLAY SIGNAL ====================
        function displaySignal() {
            if (!chartData) {
                alert('Please load a file first');
                return;
            }

            const grid = document.getElementById('chartGrid');
            const chartType = document.getElementById('chartTypeSelect').value;

            grid.innerHTML = '';

            if (viewMode === 'single') {
                grid.className = 'grid-container';
                grid.style.gridTemplateColumns = '1fr';
                const card = createChartCard('main', chartType, true);
                grid.appendChild(card);

                setTimeout(() => {
                    const prediction = chartData.predictions ? chartData.predictions['main'] : null;
                    renderChart('main', chartType, chartData, prediction);
                }, 100);
            } else {
                grid.className = 'grid-container multi-view';
                grid.style.gridTemplateColumns = 'repeat(2, 1fr)';

                const types = chartTypes[currentCategory].map(t => t.value).slice(0, 4);

                types.forEach((type, i) => {
                    const divId = `chart_${i}`;
                    const card = createChartCard(divId, type, false);
                    grid.appendChild(card);

                    setTimeout(() => {
                        const prediction = chartData.predictions ? chartData.predictions[divId] : null;
                        renderChart(divId, type, chartData, prediction);
                    }, 100 * (i + 1));
                });
            }

            if (chartData.prices && chartData.prices.close) {
                const prices = chartData.prices.close;
                const lastPrice = prices[prices.length - 1];
                document.getElementById('currentPrice').innerHTML = `Current: $${lastPrice.toFixed(2)}`;
            }
        }

        // ==================== CREATE CHART CARD ====================
        function createChartCard(id, chartType, isSingle) {
            const card = document.createElement('div');
            card.className = isSingle ? 'chart-card single' : 'chart-card multi';
            card.id = `card-${id}`;

            if (isSingle) {
                card.style.height = '600px';
            } else {
                card.style.height = '400px';
            }

            let typeName = chartType;
            for (const [cat, types] of Object.entries(chartTypes)) {
                const found = types.find(t => t.value === chartType);
                if (found) {
                    typeName = found.name;
                    break;
                }
            }

            const fullTitle = chartData ?
                `${chartData.symbol} - ${typeName}` :
                typeName || chartType.toUpperCase();

            const modeIndicator = displayMode === 'overtime' ?
                '<span style="color: #fbbf24; margin-left: 10px;">⏵ Live</span>' : '';

            card.innerHTML = `
                <div class="card-header">
                    <span style="color: var(--accent); font-weight: 600; font-size: 0.9rem;">
                        ${fullTitle} ${modeIndicator}
                    </span>
                    <div class="card-controls">
                        <button class="play-btn-small" onclick="toggleAnimation('${id}')">▶</button>
                    </div>
                </div>
                <div id="${id}" class="chart-container" style="width: 100%; height: calc(100% - 40px);"></div>
            `;

            return card;
        }

        // ==================== RENDER CHART ====================
        function renderChart(divId, type, data, predictionData = null) {
            if (!data || !data.prices) {
                document.getElementById(divId).innerHTML = '<div style="color: red; padding: 20px;">No data</div>';
                return;
            }

            let dates = data.dates || [];
            if (dates.length === 0) {
                dates = Array.from({ length: data.prices.close?.length || 0 }, (_, i) => `Day ${i + 1}`);
            }

            let closePrices = data.prices.close || [];

            if (closePrices.length === 0) {
                document.getElementById(divId).innerHTML = '<div style="color: red; padding: 20px;">No price data</div>';
                return;
            }

            let traces = [];
            let layout = {
                paper_bgcolor: '#1e293b',
                plot_bgcolor: '#1e293b',
                font: { color: '#f1f5f9', size: 10 },
                margin: { l: 50, r: 50, t: 50, b: 50 },
                showlegend: true,
                legend: {
                    font: { size: 9 },
                    orientation: 'h',
                    y: 1.1,
                    x: 0.5,
                    xanchor: 'center'
                },
                xaxis: {
                    title: 'Date',
                    gridcolor: '#334155',
                    color: '#94a3b8',
                    tickfont: { size: 9 },
                    rangeslider: { visible: false }
                },
                yaxis: {
                    title: 'Price ($)',
                    gridcolor: '#334155',
                    color: '#94a3b8',
                    tickfont: { size: 9 }
                },
                title: {
                    text: `${data.symbol || 'Chart'} - ${type}`,
                    font: { color: '#f1f5f9', size: 12 }
                }
            };

            // ===== STOCK CHARTS =====
            if (type === 'candlestick') {
                if (data.prices.open && data.prices.high && data.prices.low && data.prices.close) {
                    const minLen = Math.min(
                        data.prices.open.length,
                        data.prices.high.length,
                        data.prices.low.length,
                        data.prices.close.length,
                        dates.length
                    );

                    traces.push({
                        x: dates.slice(0, minLen),
                        open: data.prices.open.slice(0, minLen),
                        high: data.prices.high.slice(0, minLen),
                        low: data.prices.low.slice(0, minLen),
                        close: data.prices.close.slice(0, minLen),
                        type: 'candlestick',
                        name: data.symbol || 'Price',
                        increasing: { line: { color: '#22c55e' }, fillcolor: '#22c55e' },
                        decreasing: { line: { color: '#ef4444' }, fillcolor: '#ef4444' },
                        showlegend: true
                    });

                    if (data.prices.volume) {
                        traces.push({
                            x: dates.slice(0, minLen),
                            y: data.prices.volume.slice(0, minLen),
                            type: 'bar',
                            name: 'Volume',
                            yaxis: 'y2',
                            marker: {
                                color: data.prices.close.slice(0, minLen).map((c, i) =>
                                    c > data.prices.open[i] ? '#22c55e80' : '#ef444480'
                                )
                            },
                            showlegend: true
                        });

                        layout.yaxis2 = {
                            title: 'Volume',
                            overlaying: 'y',
                            side: 'right',
                            gridcolor: '#334155',
                            color: '#94a3b8',
                            domain: [0, 0.25]
                        };
                        layout.yaxis.domain = [0.3, 1];
                    }
                } else {
                    traces.push({
                        x: dates,
                        y: closePrices,
                        type: 'scatter',
                        mode: 'lines',
                        name: 'Close',
                        line: { color: '#38bdf8', width: 2 }
                    });
                }
            }
            else if (type === 'standard' || type === 'line') {
                traces.push({
                    x: dates,
                    y: closePrices,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 2 }
                });
            }
            else if (type === 'ma_overlay') {
                const ma20 = calculateMA(closePrices, 20);
                const ma50 = calculateMA(closePrices, 50);

                traces.push({
                    x: dates,
                    y: closePrices,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 1.5 }
                });

                traces.push({
                    x: dates,
                    y: ma20,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 20',
                    line: { color: '#fbbf24', width: 2 }
                });

                traces.push({
                    x: dates,
                    y: ma50,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 50',
                    line: { color: '#fb7185', width: 2 }
                });
            }
            else if (type === 'comparison') {
                if (closePrices.length > 0) {
                    const base = closePrices[0];
                    const pctChange = closePrices.map(v => ((v - base) / base * 100));

                    traces.push({
                        x: dates,
                        y: pctChange,
                        type: 'scatter',
                        mode: 'lines',
                        name: '% Change',
                        line: { color: '#38bdf8', width: 2 },
                        fill: 'tozeroy',
                        fillcolor: 'rgba(56, 189, 248, 0.2)'
                    });

                    layout.yaxis.title = 'Change (%)';
                }
            }
            else if (type === 'bollinger') {
                const ma20 = calculateMA(closePrices, 20);
                const std = calculateSTD(closePrices, 20);

                const upper = ma20.map((m, i) => m + 2 * (std[i] || 0));
                const lower = ma20.map((m, i) => m - 2 * (std[i] || 0));

                traces.push({
                    x: dates,
                    y: closePrices,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#38bdf8', width: 1.5 }
                });

                traces.push({
                    x: dates,
                    y: ma20,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 20',
                    line: { color: '#fbbf24', width: 2 }
                });

                traces.push({
                    x: dates,
                    y: upper,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Upper Band',
                    line: { color: '#94a3b8', width: 1, dash: 'dash' }
                });

                traces.push({
                    x: dates,
                    y: lower,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Lower Band',
                    line: { color: '#94a3b8', width: 1, dash: 'dash' },
                    fill: 'tonexty',
                    fillcolor: 'rgba(148, 163, 184, 0.1)'
                });
            }
            else if (type === 'volatility') {
                const returns = [];
                for (let i = 1; i < closePrices.length; i++) {
                    returns.push(Math.log(closePrices[i] / closePrices[i - 1]) * 100);
                }

                const vol = calculateSTD(returns, 20);
                const volDates = dates.slice(20);

                traces.push({
                    x: volDates,
                    y: vol.slice(20),
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Volatility %',
                    line: { color: '#fb7185', width: 2 },
                    fill: 'tozeroy',
                    fillcolor: 'rgba(251, 113, 133, 0.2)'
                });

                layout.yaxis.title = 'Volatility (%)';
            }
            else if (type === 'ma_50_200') {
                const ma50 = calculateMA(closePrices, 50);
                const ma200 = calculateMA(closePrices, 200);

                traces.push({
                    x: dates,
                    y: closePrices,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'Close',
                    line: { color: '#94a3b8', width: 1 }
                });

                traces.push({
                    x: dates,
                    y: ma50,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 50',
                    line: { color: '#fbbf24', width: 2 }
                });

                traces.push({
                    x: dates,
                    y: ma200,
                    type: 'scatter',
                    mode: 'lines',
                    name: 'MA 200',
                    line: { color: '#fb7185', width: 2 }
                });
            }
            else if (type === 'seasonality') {
                const monthData = {};
                dates.forEach((date, i) => {
                    if (i < closePrices.length) {
                        let month;
                        if (date.includes('-')) {
                            month = date.split('-')[1];
                        } else {
                            month = Math.floor(i / 30) % 12 + 1;
                        }

                        if (!monthData[month]) monthData[month] = [];
                        monthData[month].push(closePrices[i]);
                    }
                });

                const months = Object.keys(monthData).sort();
                const avgByMonth = months.map(m => {
                    const vals = monthData[m];
                    return vals.reduce((a, b) => a + b, 0) / vals.length;
                });

                traces.push({
                    x: months.map(m => {
                        const names = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                        return names[parseInt(m) - 1];
                    }),
                    y: avgByMonth,
                    type: 'bar',
                    name: 'Avg Price by Month',
                    marker: { color: '#38bdf8' }
                });
            }

            // Add prediction ONLY for line charts (standard, ma_overlay, comparison, bollinger, volatility, ma_50_200)
            // NOT for candlestick or seasonality
            if (predictionData && (type === 'standard' || type === 'line' || type === 'ma_overlay' ||
                type === 'comparison' || type === 'bollinger' || type === 'volatility' || type === 'ma_50_200')) {

                let colorIndex = 0;
                if (divId.includes('chart_')) {
                    const num = parseInt(divId.split('_')[1]) || 0;
                    colorIndex = num % predictionColors.length;
                }

                const predColor = predictionColors[colorIndex];

                traces.push({
                    x: predictionData.dates,
                    y: predictionData.forecast,
                    type: 'scatter',
                    mode: 'lines',
                    name: `Forecast (${predictionData.dates.length} days)`,
                    line: { color: predColor, width: 3, dash: 'dash' }
                });

                const confDates = predictionData.dates.concat(predictionData.dates.slice().reverse());
                const confValues = predictionData.upper.concat(predictionData.lower.slice().reverse());

                traces.push({
                    x: confDates,
                    y: confValues,
                    fill: 'toself',
                    fillcolor: predColor + '20',
                    line: { color: 'transparent' },
                    name: '95% Confidence',
                    type: 'scatter'
                });
            }

            // Set range based on display mode
            if (displayMode === 'overtime') {
                const totalPoints = dates.length;
                const windowSize = Math.min(100, totalPoints);
                if (totalPoints > 0) {
                    layout.xaxis.range = [dates[totalPoints - windowSize], dates[totalPoints - 1]];
                }
            } else {
                layout.xaxis.autorange = true;
                layout.yaxis.autorange = true;
            }

            try {
                Plotly.newPlot(divId, traces, layout, {
                    responsive: true,
                    displayModeBar: true,
                    displaylogo: false
                });
            } catch (error) {
                console.error('Plotly error:', error);
            }
        }

        // ==================== HELPER FUNCTIONS ====================

function calculateMA(data, window) {
    const result = [];
    for (let i = 0; i < data.length; i++) {
        if (i < window - 1) {
            result.push(null);
        } else {
            let sum = 0;
            let count = 0;
            for (let j = 0; j < window; j++) {
                const val = data[i - j];
                if (val !== null && !isNaN(val)) {
                    sum += val;
                    count++;
                }
            }
            // تجنب القسمة على صفر
            if (count > 0) {
                result.push(sum / count);
            } else {
                result.push(null);
            }
        }
    }
    return result;
}


        function calculateSTD(data, window) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < window - 1) {
                    result.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < window; j++) {
                        sum += data[i - j];
                    }
                    const mean = sum / window;

                    let sqSum = 0;
                    for (let j = 0; j < window; j++) {
                        sqSum += Math.pow(data[i - j] - mean, 2);
                    }
                    result.push(Math.sqrt(sqSum / window));
                }
            }
            return result;
        }

        // ==================== PREDICTION ====================
        function runPrediction() {
            if (!chartData || !chartData.prices || !chartData.prices.close) {
                alert('Please load data first');
                return;
            }

            const days = document.getElementById('forecastDays').value;
            const lastDate = chartData.dates[chartData.dates.length - 1];

            document.getElementById('aiStatus').innerHTML = '⏳ Running LSTM prediction...';

            fetch('/api/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prices: chartData.prices.close,
                    dates: chartData.dates,
                    days: parseInt(days),
                    last_date: lastDate
                })
            })
                .then(res => res.json())
                .then(result => {
                    if (result.error) {
                        document.getElementById('aiStatus').innerHTML = `❌ ${result.error}`;
                        return;
                    }

                    if (!chartData.predictions) {
                        chartData.predictions = {};
                    }

                    if (viewMode === 'single') {
                        chartData.predictions['main'] = result;
                        updateSingleChart();
                    } else {
                        const types = chartTypes[currentCategory].map(t => t.value).slice(0, 4);
                        types.forEach((type, i) => {
                            chartData.predictions[`chart_${i}`] = result;
                        });
                        updateMultiCharts();
                    }

                    document.getElementById('aiStatus').innerHTML = `✅ Prediction added to line charts only`;
                })
                .catch(err => {
                    document.getElementById('aiStatus').innerHTML = '❌ Prediction failed';
                });
        }

        // ==================== ANIMATION ====================
function toggleAnimation(divId) {
    const btn = event.target;

    if (animations[divId]) {
        // إيقاف animation
        clearInterval(animations[divId]);
        delete animations[divId];
        btn.innerHTML = '▶';
        btn.style.backgroundColor = 'var(--accent)';
    } else {
        // بدء animation من آخر position
        btn.innerHTML = '⏸';
        btn.style.backgroundColor = '#fbbf24';

        const dates = chartData.dates;
        if (!dates || dates.length === 0) return;

        const totalPoints = dates.length;
        const windowSize = parseInt(document.getElementById('windowSize').value) || 100;
        const maxStart = Math.max(0, totalPoints - windowSize);

        // خد آخر position من الذاكرة، لو مفيش ابدأ من 0
        let pos = animationPositions[divId] || 0;

        // لو الـ position أكبر من الحد الأقصى، ابدأ من 0
        if (pos > maxStart) pos = 0;

        animations[divId] = setInterval(() => {
            pos += 1;

            // لو وصلنا للآخر، نرجع للأول
            if (pos > maxStart) {
                pos = 0;
            }

            if (pos + windowSize - 1 < dates.length) {
                Plotly.relayout(divId, {
                    'xaxis.range': [dates[pos], dates[pos + windowSize - 1]]
                });
            }

            // احفظ الـ position الحالي في الذاكرة
            animationPositions[divId] = pos;
        }, 100);
    }
}

        function playAll() {
            document.querySelectorAll('.play-btn-small').forEach(btn => {
                if (btn.innerHTML === '▶') {
                    btn.click();
                }
            });
        }

        function stopAll() {
    // أوقف كل الـ animations
    Object.keys(animations).forEach(id => {
        clearInterval(animations[id]);
        delete animations[id];
    });

    // غير شكل الأزرار
    document.querySelectorAll('.play-btn-small').forEach(btn => {
        btn.innerHTML = '▶';
        btn.style.backgroundColor = 'var(--accent)';
    });

    // **مهم: متمسحش الـ animationPositions هنا**
    // عشان نحتفظ بآخر مكان وقفنا عنده

    // لو في وضع static، نرجع الشارت للعرض الكامل
    if (displayMode === 'static' && chartData) {
        if (viewMode === 'single') {
            const chartDiv = document.getElementById('main');
            if (chartDiv) {
                Plotly.relayout('main', {
                    'xaxis.autorange': true,
                    'yaxis.autorange': true
                });
            }
        } else {
            const types = chartTypes[currentCategory].map(t => t.value).slice(0, 4);
            types.forEach((type, i) => {
                const divId = `chart_${i}`;
                const chartDiv = document.getElementById(divId);
                if (chartDiv) {
                    Plotly.relayout(divId, {
                        'xaxis.autorange': true,
                        'yaxis.autorange': true
                    });
                }
            });
        }
    }
}

function clearAll() {
    stopAll();
    document.getElementById('chartGrid').innerHTML = '';
    document.getElementById('aiStatus').innerHTML = '⚡ Ready to analyze stocks and commodities';
    chartData = null;
    document.getElementById('file-info').style.display = 'none';
    document.getElementById('filename').value = '';

    // **مسح الـ positions بس هنا عشان clear all**
    animationPositions = {};

    showWelcomeMessage();
}

        function toggleDisplayMode(mode) {
            displayMode = mode;

            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            stopAll();

            if (chartData) {
                if (viewMode === 'single') {
                    updateSingleChart();
                } else {
                    updateMultiCharts();
                }
            }
        }

        function updateSingleChart() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';

            const chartType = document.getElementById('chartTypeSelect').value;
            const card = createChartCard('main', chartType, true);
            grid.appendChild(card);

            setTimeout(() => {
                const prediction = chartData.predictions ? chartData.predictions['main'] : null;
                renderChart('main', chartType, chartData, prediction);
            }, 100);
        }

        function updateMultiCharts() {
            const grid = document.getElementById('chartGrid');
            grid.innerHTML = '';

            const types = chartTypes[currentCategory].map(t => t.value).slice(0, 4);

            types.forEach((type, i) => {
                const divId = `chart_${i}`;
                const card = createChartCard(divId, type, false);
                grid.appendChild(card);

                setTimeout(() => {
                    const prediction = chartData.predictions ? chartData.predictions[divId] : null;
                    renderChart(divId, type, chartData, prediction);
                }, 100 * (i + 1));
            });
        }
    </script>
