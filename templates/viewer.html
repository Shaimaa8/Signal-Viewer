<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioSignal AI Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2 class="logo">BioSignal <span>AI</span></h2>
            </div>

            <div class="control-group" style="background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #38bdf8; margin-bottom: 15px;">
                <label style="color: #38bdf8; font-size: 11px; font-weight: bold; display: block; margin-bottom: 10px;">🧠 AI COMPARISON</label>
                <button class="btn-run" onclick="runAiAnalysis()" style="width: 100%; background: #0ea5e9; color: white; margin-bottom: 10px; border-radius: 5px; padding: 8px; border:none; cursor:pointer;">
                    Run AI Prediction
                </button>
                <div id="aiOutput" style="font-size: 12px; line-height: 1.6;">
                    <div style="color: #94a3b8;">DL Prediction: <span id="aiResult" style="color: white; font-weight: bold;">--</span></div>
                    <div style="color: #94a3b8;">Classic ML: <span id="classicResult" style="color: white;">--</span></div>
                </div>
            </div>

            <div class="control-group">
                <label class="section-title">DATA SOURCE</label>

                <select id="signalType" style="width: 100%; padding: 8px; border-radius: 5px; background: #1e293b; color: white; border: 1px solid #334155; margin-bottom: 10px; cursor: pointer;">
                    <option value="ecg">🫀 ECG Signal (Heart)</option>
                    <option value="eeg">🧠 EEG Signal (Brain)</option>
                </select>

                <input type="file" id="fileInput" multiple hidden>
                <button class="btn-run" style="background: #334155; color: white; width: 100%;" onclick="document.getElementById('fileInput').click()">
                    Choose Files (CSV, HEA, EDF...)
                </button>
            </div>

            <div class="control-group">
                <label>VIEWING MODE</label>
                <select id="modeSelect">
                    <option value="single">Sequential Printing (Single)</option>
                    <option value="multi">Refresh Dashboard (Multi)</option>
                </select>
            </div>

            <div class="control-group">
                <label>LAYOUT STYLE</label>
                <select id="layoutStyle" onchange="toggleOverlaySettings()">
                    <option value="grid">Separate Windows</option>
                    <option value="overlay">Overlay Channels</option>
                </select>
            </div>

            <div class="control-group">
                <label>SELECT CHANNELS (CTRL+CLICK)</label>
                <select id="channel1Select" multiple style="height: 120px; background: #1e293b; color: white; border: 1px solid #334155; border-radius: 6px;"></select>
            </div>

            <div id="overlaySettings" class="ai-results-box" style="min-height: 100px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; padding: 10px; background: #0f172a; border-radius: 8px;">
                <label style="color: #38bdf8; font-size: 11px; font-weight: bold; display: block; margin-bottom: 10px;">🎨 CUSTOMIZE CHANNELS</label>
                <div id="channelsConfigList" style="display: flex; flex-direction: column; gap: 8px;">
                    <p style="font-size: 11px; color: #64748b; text-align: center;">Pick channels to customize</p>
                </div>
            </div>

            <div class="control-group">
                <label>ANALYSIS TYPE</label>
                <select id="plotType" onchange="checkPolarView()">
                    <option value="signal">Time-Domain Signal</option>
                    <option value="polar">Periodic Polar Plot</option>
                    <option value="recurrence">Poincaré Map</option>
                    <option value="xor">XOR Abnormality Detector</option>
                </select>
            </div>
            <div class="control-group" id="recurrenceOptions" style="display: none; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px dashed #38bdf8; margin-bottom: 15px;">
                <label style="color: #38bdf8; font-size: 11px; font-weight: bold; display: block; margin-bottom: 8px;">🎯 2D MAP SETTINGS</label>

                <label style="font-size: 10px; color: #cbd5e1;">X-Axis Channel:</label>
                <select id="xChannelSelect" onchange="if(window.refreshVisiblePlots) refreshVisiblePlots()" style="width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #334155;"></select>

                <label style="font-size: 10px; color: #cbd5e1;">Y-Axis Channel:</label>
                <select id="yChannelSelect" onchange="if(window.refreshVisiblePlots) refreshVisiblePlots()" style="width: 100%; padding: 6px; margin-bottom: 8px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #334155;"></select>

                <label style="font-size: 10px; color: #cbd5e1;">Intensity Color Map:</label>
                <select id="colorMapSelect" onchange="if(window.refreshVisiblePlots) refreshVisiblePlots()" style="width: 100%; padding: 6px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="Hot">Hot (Black/Red/Yellow)</option>
                    <option value="Viridis">Viridis (Green/Blue)</option>
                    <option value="Plasma">Plasma (Purple/Orange)</option>
                    <option value="Jet">Jet (Blue/Red)</option>
                </select>
            </div>
            <div id="polarOptions" style="display: none; background: #0f172a; padding: 12px; border-radius: 8px; border: 1px dashed #38bdf8; margin-bottom: 15px;">
                <label style="color: #38bdf8; font-size: 11px; font-weight: bold; display: block; margin-bottom: 8px;">🔄 POLAR DISPLAY MODE</label>
                <select id="polarMode" onchange="if(window.refreshVisiblePlots) refreshVisiblePlots()" style="width: 100%; padding: 6px; border-radius: 4px; background: #1e293b; color: white; border: 1px solid #334155;">
                    <option value="overlay">Standard Overlay</option>
                    <option value="ratio_1_2">Ratio Mode (V1 / V2)</option>
                    <option value="ratio_2_1">Ratio Mode (V2 / V1)</option>
                </select>
                <p style="font-size: 9px; color: #94a3b8; margin-top: 5px; line-height: 1.2;">* Ratio mode requires exactly 2 selected channels.</p>
            </div>

            <div class="control-group">
                <label>WINDOW SIZE: <span id="rangeVal" style="color:#38bdf8">1000</span></label>
                <input type="range" id="timeSlider" min="100" max="5000" value="1000" oninput="document.getElementById('rangeVal').innerText = this.value">
            </div>

            <div class="control-group">
                <label>SPEED: <span id="speedVal" style="color:#38bdf8">1x</span></label>
                <input type="range" id="speedSlider" min="1" max="20" value="5" oninput="document.getElementById('speedVal').innerText = this.value + 'x'">
            </div>

            <div class="action-buttons-grid">
                <button class="btn-run" onclick="plotNow()" style="width: 100%; background: #38bdf8; color: #0f172a; font-weight: bold; border:none; padding:10px; border-radius:6px; cursor:pointer;">Visualize</button>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="btn-play-small" onclick="startPlayback()" style="flex: 1; padding: 8px;">▶ Play</button>
                    <button class="btn-stop-small" onclick="stopPlayback()" style="flex: 1; padding: 8px;">■ Stop</button>
                </div>
            </div>

            <div class="control-group" style="margin-top: 15px;">
                <button class="btn-secondary" onclick="clearPlots()" style="width: 100%; margin-bottom: 5px; background: #ef4444; color: white;">Clear All Plots</button>
                <button class="btn-secondary" onclick="location.href='/'" style="width: 100%;">🏠 Home</button>
            </div>
        </aside>

        <main class="main-content" style="background: #020617;">
            <header class="top-nav" style="padding: 15px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center;">
                <div class="ai-status-bar" id="aiStatus" style="color: #38bdf8; font-weight: bold; font-size: 14px;">
                    Status: Waiting for Data...
                </div>
            </header>

            <div id="chartGrid" style="
                padding: 20px;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr));
                gap: 20px;
                width: 100%;
                box-sizing: border-box;
            "></div>
        </main>
    </div>

  <script>
        function checkPolarView() {
            const type = document.getElementById('plotType').value;
            const polarOptions = document.getElementById('polarOptions');
            const recurrenceOptions = document.getElementById('recurrenceOptions'); // الصندوق الجديد بتاع الـ X و Y

            if(polarOptions) polarOptions.style.display = (type === 'polar') ? 'block' : 'none';
            if(recurrenceOptions) recurrenceOptions.style.display = (type === 'recurrence') ? 'block' : 'none';
        }

        function toggleOverlaySettings() {}
        document.getElementById('speedVal').innerText = document.getElementById('speedSlider').value + 'x';
        window.onload = checkPolarView;
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
